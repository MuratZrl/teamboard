name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  api-typecheck:
    name: API Type Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teamboard
          POSTGRES_PASSWORD: teamboard_test
          POSTGRES_DB: teamboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://teamboard:teamboard_test@localhost:5432/teamboard?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @teamboard/api exec prisma migrate deploy
      - run: pnpm --filter @teamboard/api exec prisma generate
      - run: pnpm --filter @teamboard/api exec nest build

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-and-build, api-typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teamboard
          POSTGRES_PASSWORD: teamboard_test
          POSTGRES_DB: teamboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://teamboard:teamboard_test@localhost:5432/teamboard?schema=public
      JWT_SECRET: ci-test-jwt-secret
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXTAUTH_SECRET: ci-test-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      PORT: 4000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @teamboard/api exec prisma migrate deploy
      - run: pnpm --filter @teamboard/api exec prisma generate
      - run: pnpm --filter @teamboard/web exec playwright install --with-deps chromium

      # Start API in background
      - run: pnpm --filter @teamboard/api exec nest build
      - run: node apps/api/dist/main.js &
        env:
          NODE_ENV: test

      # Build and start web in background
      - run: pnpm --filter @teamboard/web build
        env:
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
      - run: pnpm --filter @teamboard/web start &
        env:
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder

      # Wait for services
      - run: npx wait-on http://localhost:4000/api/auth/me http://localhost:3000 --timeout 60000 || true

      # Run E2E tests
      - run: pnpm --filter @teamboard/web test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
