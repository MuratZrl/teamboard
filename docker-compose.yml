services:
  postgres:
    image: postgres:16-alpine
    container_name: teamboard-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: teamboard
      POSTGRES_PASSWORD: teamboard_dev
      POSTGRES_DB: teamboard
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
